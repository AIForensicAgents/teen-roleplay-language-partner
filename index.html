<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scale=no">
<title>Teen Roleplay Language Partner</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/marked@11.1.1/marked.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
body { overscroll-behavior: none; }
.chat-container { height: calc(100vh - 280px); }
@media (max-height: 600px) { .chat-container { height: calc(100vh - 220px); } }
.msg-bubble { max-width: 85%; animation: fadeUp 0.3s ease; }
@keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
.typing-dot { animation: pulse 1.2s infinite; }
.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }
.scenario-card { transition: all 0.2s ease; }
.scenario-card:active { transform: scale(0.97); }
.gradient-header { background: linear-gradient(135deg, #6366f1, #8b5cf6, #a78bfa); }
.feedback-badge { animation: fadeUp 0.3s ease; }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-thumb { background: #c4b5fd; border-radius: 4px; }
.lang-chip { transition: all 0.15s ease; }
.lang-chip.active { transform: scale(1.05); }
</style>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        brand: { 50:'#f5f3ff',100:'#ede9fe',200:'#ddd6fe',300:'#c4b5fd',400:'#a78bfa',500:'#8b5cf6',600:'#7c3aed',700:'#6d28d9',800:'#5b21b6',900:'#4c1d95' }
      }
    }
  }
}
</script>
</head>
<body class="bg-brand-50 min-h-screen">

<div id="app" class="max-w-lg mx-auto relative min-h-screen flex flex-col">

  <!-- ONBOARDING SCREEN -->
  <div id="onboarding-screen" class="flex flex-col min-h-screen">
    <div class="gradient-header px-5 pt-12 pb-8 rounded-b-3xl shadow-lg">
      <h1 class="text-white text-2xl font-extrabold">🗣️ RolePlay Lingo</h1>
      <p class="text-brand-200 text-sm mt-1">Your AI language partner for real teen conversations</p>
    </div>
    <div class="flex-1 px-5 pt-6 pb-4 overflow-y-auto">
      <h2 class="text-brand-800 font-bold text-lg mb-1">Hey there! 👋</h2>
      <p class="text-brand-600 text-sm mb-5">Pick your target language and a scenario to start practicing. It's like texting a friend — in another language!</p>
      
      <label class="text-brand-700 font-semibold text-sm mb-2 block">🌍 What language are you learning?</label>
      <div id="lang-selector" class="flex flex-wrap gap-2 mb-5">
        <button onclick="selectLang('Spanish','🇪🇸')" class="lang-chip flex items-center gap-1.5 px-4 py-2.5 rounded-full border-2 border-brand-200 bg-white text-brand-700 font-medium text-sm" data-lang="Spanish">🇪🇸 Spanish</button>
        <button onclick="selectLang('French','🇫🇷')" class="lang-chip flex items-center gap-1.5 px-4 py-2.5 rounded-full border-2 border-brand-200 bg-white text-brand-700 font-medium text-sm" data-lang="French">🇫🇷 French</button>
        <button onclick="selectLang('Mandarin','🇨🇳')" class="lang-chip flex items-center gap-1.5 px-4 py-2.5 rounded-full border-2 border-brand-200 bg-white text-brand-700 font-medium text-sm" data-lang="Mandarin">🇨🇳 Mandarin</button>
        <button onclick="selectLang('German','🇩🇪')" class="lang-chip flex items-center gap-1.5 px-4 py-2.5 rounded-full border-2 border-brand-200 bg-white text-brand-700 font-medium text-sm" data-lang="German">🇩🇪 German</button>
        <button onclick="selectLang('Japanese','🇯🇵')" class="lang-chip flex items-center gap-1.5 px-4 py-2.5 rounded-full border-2 border-brand-200 bg-white text-brand-700 font-medium text-sm" data-lang="Japanese">🇯🇵 Japanese</button>
        <button onclick="selectLang('Korean','🇰🇷')" class="lang-chip flex items-center gap-1.5 px-4 py-2.5 rounded-full border-2 border-brand-200 bg-white text-brand-700 font-medium text-sm" data-lang="Korean">🇰🇷 Korean</button>
        <button onclick="selectLang('Italian','🇮🇹')" class="lang-chip flex items-center gap-1.5 px-4 py-2.5 rounded-full border-2 border-brand-200 bg-white text-brand-700 font-medium text-sm" data-lang="Italian">🇮🇹 Italian</button>
        <button onclick="selectLang('Portuguese','🇧🇷')" class="lang-chip flex items-center gap-1.5 px-4 py-2.5 rounded-full border-2 border-brand-200 bg-white text-brand-700 font-medium text-sm" data-lang="Portuguese">🇧🇷 Portuguese</button>
      </div>

      <label class="text-brand-700 font-semibold text-sm mb-2 block">📚 Your level:</label>
      <div id="level-selector" class="flex gap-2 mb-5">
        <button onclick="selectLevel('Beginner')" class="lang-chip px-4 py-2.5 rounded-full border-2 border-brand-200 bg-white text-brand-700 font-medium text-sm" data-level="Beginner">🌱 Beginner</button>
        <button onclick="selectLevel('Intermediate')" class="lang-chip px-4 py-2.5 rounded-full border-2 border-brand-200 bg-white text-brand-700 font-medium text-sm" data-level="Intermediate">🌿 Intermediate</button>
        <button onclick="selectLevel('Advanced')" class="lang-chip px-4 py-2.5 rounded-full border-2 border-brand-200 bg-white text-brand-700 font-medium text-sm" data-level="Advanced">🌳 Advanced</button>
      </div>

      <label class="text-brand-700 font-semibold text-sm mb-2 block">🎭 Pick a scenario:</label>
      <div id="scenario-grid" class="grid grid-cols-2 gap-3 mb-4"></div>
    </div>
    <div class="px-5 pb-6">
      <button id="start-btn" onclick="startChat()" disabled class="w-full py-3.5 rounded-2xl bg-brand-500 text-white font-bold text-base shadow-lg shadow-brand-300/40 disabled:opacity-40 disabled:shadow-none transition-all active:scale-[0.98]">
        Start Practicing! 🚀
      </button>
    </div>
  </div>

  <!-- CHAT SCREEN -->
  <div id="chat-screen" class="hidden flex flex-col min-h-screen">
    <div class="gradient-header px-4 pt-10 pb-4 rounded-b-2xl shadow-md flex items-center gap-3">
      <button onclick="goBack()" class="w-10 h-10 flex items-center justify-center rounded-full bg-white/20 text-white text-lg">←</button>
      <div class="flex-1 min-w-0">
        <h1 id="chat-title" class="text-white font-bold text-base truncate"></h1>
        <p id="chat-subtitle" class="text-brand-200 text-xs truncate"></p>
      </div>
      <button onclick="showFeedbackPanel()" class="w-10 h-10 flex items-center justify-center rounded-full bg-white/20 text-white text-lg">📊</button>
    </div>

    <div id="chat-messages" class="chat-container flex-1 overflow-y-auto px-4 py-3 space-y-3"></div>

    <div class="px-4 pb-5 pt-2 bg-brand-50">
      <div id="suggestion-chips" class="flex gap-2 overflow-x-auto pb-2 mb-2 scrollbar-hide"></div>
      <div class="flex gap-2">
        <input id="msg-input" type="text" placeholder="Type in your target language..." 
          class="flex-1 px-4 py-3 rounded-2xl border-2 border-brand-200 bg-white text-brand-900 text-sm focus:outline-none focus:border-brand-400 placeholder:text-brand-300"
          onkeydown="if(event.key==='Enter')sendMessage()">
        <button onclick="sendMessage()" id="send-btn" class="w-12 h-12 rounded-2xl bg-brand-500 text-white flex items-center justify-center shadow-md shadow-brand-300/30 active:scale-95 transition-transform">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>
  </div>

  <!-- FEEDBACK PANEL -->
  <div id="feedback-panel" class="hidden fixed inset-0 z-50 bg-black/40 flex items-end justify-center">
    <div class="bg-white w-full max-w-lg rounded-t-3xl p-5 pb-8 max-h-[80vh] overflow-y-auto">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-brand-800 font-bold text-lg">📊 Session Feedback</h2>
        <button onclick="hideFeedbackPanel()" class="w-10 h-10 rounded-full bg-brand-100 flex items-center justify-center text-brand-600 font-bold">✕</button>
      </div>
      <div id="feedback-content" class="space-y-3"></div>
    </div>
  </div>
</div>

<script>
// Global AI tracking variables
let totalAIInputTokens = 0;
let totalAIOutputTokens = 0;
let totalAITime = 0;
let aliasTimings = {};

const API_BASE = 'https://16504442930.work';

const SCENARIOS = [
  { id:'locker', emoji:'🏫', title:'Locker Talk', desc:'Chat between classes about weekend plans', sysContext:'Two teens chatting at their lockers between classes about weekend plans, school gossip, and upcoming events.' },
  { id:'project', emoji:'📝', title:'Group Project', desc:'Collaborate on a school assignment', sysContext:'Teens working together on a school group project, dividing tasks, sharing ideas, and negotiating roles.' },
  { id:'cafeteria', emoji:'🍕', title:'Cafeteria Chat', desc:'Lunchtime conversation with friends', sysContext:'Friends sitting together at the school cafeteria, talking about food, classes, social media, and friends.' },
  { id:'interview', emoji:'🎤', title:'Job Interview', desc:'Practice for a part-time job interview', sysContext:'A teen being interviewed for a part-time job at a local store or restaurant. Practice professional but age-appropriate dialogue.' },
  { id:'party', emoji:'🎉', title:'Party Planning', desc:'Organize a birthday party with friends', sysContext:'Teens planning a birthday party together — discussing venue, food, music, invitations, and budget.' },
  { id:'sports', emoji:'⚽', title:'Sports Talk', desc:'Discuss the big game and practice', sysContext:'Teens discussing sports — the big game, team practice, favorite athletes, and staying active.' },
  { id:'shopping', emoji:'🛍️', title:'Shopping Trip', desc:'Help a friend pick an outfit', sysContext:'Teens at a clothing store or mall, helping each other pick outfits, discussing style and budget.' },
  { id:'travel', emoji:'✈️', title:'Travel Dreams', desc:'Plan an imaginary trip together', sysContext:'Teens planning a dream vacation — picking destinations, activities, packing lists, and travel tips.' }
];

let state = {
  lang: null,
  langEmoji: '',
  level: null,
  scenario: null,
  messages: [],
  sessionFeedback: [],
  msgCount: 0
};

function loadState() {
  try {
    const s = localStorage.getItem('rp_lingo_state');
    if (s) {
      const parsed = JSON.parse(s);
      if (parsed.lang) state.lang = parsed.lang;
      if (parsed.langEmoji) state.langEmoji = parsed.langEmoji;
      if (parsed.level) state.level = parsed.level;
    }
  } catch(e) {}
}

function saveState() {
  localStorage.setItem('rp_lingo_state', JSON.stringify({
    lang: state.lang, langEmoji: state.langEmoji, level: state.level
  }));
}

function init() {
  loadState();
  renderScenarios();
  if (state.lang) {
    document.querySelectorAll('#lang-selector .lang-chip').forEach(b => {
      if (b.dataset.lang === state.lang) { b.classList.add('active','bg-brand-500','text-white','border-brand-500'); b.classList.remove('bg-white','text-brand-700','border-brand-200'); }
    });
  }
  if (state.level) {
    document.querySelectorAll('#level-selector .lang-chip').forEach(b => {
      if (b.dataset.level === state.level) { b.classList.add('active','bg-brand-500','text-white','border-brand-500'); b.classList.remove('bg-white','text-brand-700','border-brand-200'); }
    });
  }
  checkStartReady();
}

function selectLang(lang, emoji) {
  state.lang = lang; state.langEmoji = emoji; saveState();
  document.querySelectorAll('#lang-selector .lang-chip').forEach(b => {
    if (b.dataset.lang === lang) { b.classList.add('active','bg-brand-500','text-white','border-brand-500'); b.classList.remove('bg-white','text-brand-700','border-brand-200'); }
    else { b.classList.remove('active','bg-brand-500','text-white','border-brand-500'); b.classList.add('bg-white','text-brand-700','border-brand-200'); }
  });
  checkStartReady();
}

function selectLevel(level) {
  state.level = level; saveState();
  document.querySelectorAll('#level-selector .lang-chip').forEach(b => {
    if (b.dataset.level === level) { b.classList.add('active','bg-brand-500','text-white','border-brand-500'); b.classList.remove('bg-white','text-brand-700','border-brand-200'); }
    else { b.classList.remove('active','bg-brand-500','text-white','border-brand-500'); b.classList.add('bg-white','text-brand-700','border-brand-200'); }
  });
  checkStartReady();
}

function renderScenarios() {
  const grid = document.getElementById('scenario-grid');
  grid.innerHTML = SCENARIOS.map(s => `
    <button onclick="selectScenario('${s.id}')" data-scenario="${s.id}" class="scenario-card text-left p-3 rounded-2xl border-2 border-brand-200 bg-white hover:border-brand-400">
      <div class="text-2xl mb-1">${s.emoji}</div>
      <div class="text-brand-800 font-semibold text-sm">${s.title}</div>
      <div class="text-brand-400 text-xs mt-0.5">${s.desc}</div>
    </button>
  `).join('');
}

function selectScenario(id) {
  state.scenario = SCENARIOS.find(s => s.id === id);
  document.querySelectorAll('.scenario-card').forEach(c => {
    if (c.dataset.scenario === id) { c.classList.add('border-brand-500','bg-brand-50'); c.classList.remove('border-brand-200','bg-white'); }
    else { c.classList.remove('border-brand-500','bg-brand-50'); c.classList.add('border-brand-200','bg-white'); }
  });
  checkStartReady();
}

function checkStartReady() {
  document.getElementById('start-btn').disabled = !(state.lang && state.level && state.scenario);
}

async function startChat() {
  state.messages = [];
  state.sessionFeedback = [];
  state.msgCount = 0;
  document.getElementById('onboarding-screen').classList.add('hidden');
  document.getElementById('chat-screen').classList.remove('hidden');
  document.getElementById('chat-title').textContent = `${state.scenario.emoji} ${state.scenario.title}`;
  document.getElementById('chat-subtitle').textContent = `${state.langEmoji} ${state.lang} • ${state.level}`;
  document.getElementById('chat-messages').innerHTML = '';
  document.getElementById('suggestion-chips').innerHTML = '';

  // Get opening message from AI
  showTyping();
  try {
    const result = await callAI(`You are a friendly teen language practice partner. You are playing a roleplay scenario with a ${state.level}-level ${state.lang} learner.

SCENARIO: "${state.scenario.title}" — ${state.scenario.sysContext}

Generate an opening message to start the roleplay conversation. The message should be:
- Written in ${state.lang} (the target language)
- Appropriate for ${state.level} level
- Include a parenthetical English translation after each sentence for beginners/intermediates
- Be 1-3 sentences, natural and teen-friendly
- End with a question to prompt the learner to respond

Also provide 3 short suggested reply phrases the learner could use.

Return a JSON object with exactly these keys:
- "message": string (the opening roleplay message in ${state.lang} with translations)
- "suggestions": array of exactly 3 strings (short reply phrases in ${state.lang})
- "pronunciationTip": string (one quick pronunciation tip relevant to words in your message)`);
    
    removeTyping();
    addMessage('ai', result.message);
    if (result.pronunciationTip) {
      addFeedbackBubble('🗣️ Tip: ' + result.pronunciationTip);
    }
    renderSuggestions(result.suggestions || []);
  } catch(e) {
    removeTyping();
    addMessage('system', '⚠️ Could not start the conversation. Please try again.');
  }
}

function goBack() {
  document.getElementById('chat-screen').classList.add('hidden');
  document.getElementById('onboarding-screen').classList.remove('hidden');
}

async function sendMessage() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  state.msgCount++;

  addMessage('user', text);
  document.getElementById('suggestion-chips').innerHTML = '';
  showTyping();

  const conversationHistory = state.messages.slice(-10).map(m => 
    `${m.role === 'user' ? 'LEARNER' : 'PARTNER'}: ${m.text}`
  ).join('\n');

  try {
    const result = await callAI(`You are a friendly teen language practice partner in a roleplay scenario. You are practicing ${state.lang} with a ${state.level}-level learner.

SCENARIO: "${state.scenario.title}" — ${state.scenario.sysContext}

CONVERSATION SO FAR:
${conversationHistory}

The learner just said: "${text}"

Your job:
1. Stay in character for the scenario and respond naturally in ${state.lang}
2. Analyze the learner's message for any grammar, vocabulary, or phrasing errors
3. Provide pronunciation guidance on tricky words they used
4. Give 3 suggested reply options for their next turn

${state.level === 'Beginner' ? 'Include English translations in parentheses after each sentence. Use simple vocabulary and short sentences.' : ''}
${state.level === 'Intermediate' ? 'Include English translations for difficult phrases only. Use varied vocabulary.' : ''}
${state.level === 'Advanced' ? 'Do NOT include translations. Use natural, colloquial speech including slang appropriate for teens.' : ''}

Return a JSON object with exactly these keys and types:
- "reply": string (your in-character response in ${state.lang}, 1-3 sentences)
- "corrections": array of objects, each with "original": string, "corrected": string, "explanation": string (empty array if no errors found)
- "pronunciationFeedback": string (pronunciation tip for a word the learner used or you used, or empty string)
- "fluencyScore": number between 1 and 10 (rate the learner's fluency for this message)
- "suggestions": array of exactly 3 strings (short reply phrases in ${state.lang} the learner could use next)
- "encouragement": string (a brief, teen-friendly encouraging comment in English like "Nice work!" or "You're getting the hang of it!")`);

    removeTyping();

    // Show corrections if any
    if (result.corrections && result.corrections.length > 0) {
      result.corrections.forEach(c => {
        addFeedbackBubble(`✏️ "${c.original}" → "${c.corrected}" — ${c.explanation}`);
      });
    }

    // Show encouragement
    if (result.encouragement) {
      addFeedbackBubble(`💪 ${result.encouragement}`);
    }

    // Show pronunciation
    if (result.pronunciationFeedback) {
      addFeedbackBubble(`🗣️ ${result.pronunciationFeedback}`);
    }

    addMessage('ai', result.reply);
    renderSuggestions(result.suggestions || []);

    // Track session feedback
    state.sessionFeedback.push({
      msg: text,
      fluency: result.fluencyScore || 5,
      corrections: result.corrections?.length || 0
    });

    // Every 5 messages, offer a summary
    if (state.msgCount % 5 === 0) {
      addSystemMessage(`📊 You've exchanged ${state.msgCount} messages! Tap the chart icon ↗️ for your progress summary.`);
    }

  } catch(e) {
    removeTyping();
    addMessage('system', '⚠️ Something went wrong. Try sending again!');
  }
}

function addMessage(role, text) {
  state.messages.push({ role, text, time: Date.now() });
  const container = document.getElementById('chat-messages');
  const div = document.createElement('div');
  
  if (role === 'user') {
    div.className = 'flex justify-end';
    div.innerHTML = `<div class="msg-bubble bg-brand-500 text-white px-4 py-3 rounded-2xl rounded-tr-md text-sm leading-relaxed">${escapeHtml(text)}</div>`;
  } else if (role === 'ai') {
    div.className = 'flex justify-start';
    div.innerHTML = `<div class="msg-bubble bg-white border border-brand-100 text-brand-900 px-4 py-3 rounded-2xl rounded-tl-md text-sm leading-relaxed shadow-sm">${escapeHtml(text)}</div>`;
  } else {
    div.className = 'flex justify-center';
    div.innerHTML = `<div class="msg-bubble bg-brand-100 text-brand-600 px-4 py-2 rounded-full text-xs font-medium">${text}</div>`;
  }
  
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function addFeedbackBubble(text) {
  const container = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = 'flex justify-start feedback-badge';
  div.innerHTML = `<div class="msg-bubble bg-amber-50 border border-amber-200 text-amber-800 px-3 py-2 rounded-xl text-xs leading-relaxed">${escapeHtml(text)}</div>`;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function addSystemMessage(text) {
  const container = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = 'flex justify-center';
  div.innerHTML = `<div class="msg-bubble bg-brand-100 text-brand-600 px-4 py-2 rounded-full text-xs font-medium text-center">${text}</div>`;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function renderSuggestions(suggestions) {
  const chips = document.getElementById('suggestion-chips');
  chips.innerHTML = suggestions.map(s => 
    `<button onclick="useSuggestion(this)" class="flex-shrink-0 px-3 py-2 rounded-full bg-brand-100 text-brand-700 text-xs font-medium border border-brand-200 active:bg-brand-200 whitespace-nowrap">${escapeHtml(s)}</button>`
  ).join('');
}

function useSuggestion(btn) {
  document.getElementById('msg-input').value = btn.textContent;
  sendMessage();
}

function showTyping() {
  const container = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.id = 'typing-indicator';
  div.className = 'flex justify-start';
  div.innerHTML = `<div class="msg-bubble bg-white border border-brand-100 px-4 py-3 rounded-2xl rounded-tl-md shadow-sm flex gap-1.5">
    <span class="typing-dot w-2 h-2 bg-brand-400 rounded-full"></span>
    <span class="typing-dot w-2 h-2 bg-brand-400 rounded-full"></span>
    <span class="typing-dot w-2 h-2 bg-brand-400 rounded-full"></span>
  </div>`;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing-indicator');
  if (t) t.remove();
}

async function showFeedbackPanel() {
  document.getElementById('feedback-panel').classList.remove('hidden');
  const content = document.getElementById('feedback-content');
  
  if (state.sessionFeedback.length === 0) {
    content.innerHTML = `<div class="text-center py-8 text-brand-400"><p class="text-4xl mb-2">📝</p><p>Keep chatting to get feedback!</p></div>`;
    return;
  }

  content.innerHTML = `<div class="text-center py-4 text-brand-400"><p>Generating your feedback summary...</p></div>`;

  const avgFluency = state.sessionFeedback.reduce((a,b) => a + b.fluency, 0) / state.sessionFeedback.length;
  const totalCorrections = state.sessionFeedback.reduce((a,b) => a + b.corrections, 0);
  const totalMsgs = state.sessionFeedback.length;

  try {
    const result = await callAI(`You are a supportive language teacher providing a session summary for a ${state.level}-level ${state.lang} learner.

Session stats:
- Messages sent: ${totalMsgs}
- Average fluency score: ${avgFluency.toFixed(1)}/10
- Total corrections made: ${totalCorrections}
- Scenario: ${state.scenario.title}

The learner's messages were:
${state.sessionFeedback.map((f,i) => `${i+1}. "${f.msg}" (fluency: ${f.fluency}/10, corrections: ${f.corrections})`).join('\n')}

Provide an encouraging, teen-friendly progress summary.

Return a JSON object with exactly these keys:
- "overallGrade": string (a letter grade A+ through F, be generous and encouraging)
- "strengths": array of 2-3 strings (things the learner did well)
- "improvements": array of 1-3 strings (areas to work on, phrased positively)
- "funFact": string (a fun cultural fact related to ${state.lang}-speaking countries)
- "motivationalQuote": string (a motivational quote in ${state.lang} with English translation)`);

    const stars = avgFluency >= 8 ? '⭐⭐⭐⭐⭐' : avgFluency >= 6 ? '⭐⭐⭐⭐' : avgFluency >= 4 ? '⭐⭐⭐' : '⭐⭐';

    content.innerHTML = `
      <div class="text-center p-4 bg-brand-100 rounded-2xl">
        <div class="text-4xl font-bold text-brand-700">${result.overallGrade || 'B+'}</div>
        <div class="text-lg mt-1">${stars}</div>
        <div class="text-brand-500 text-sm">Avg Fluency: ${avgFluency.toFixed(1)}/10 • ${totalMsgs} messages</div>
      </div>
      <div class="bg-green-50 border border-green-200 rounded-2xl p-4">
        <h3 class="text-green-700 font-bold text-sm mb-2">💪 Strengths</h3>
        <ul class="space-y-1">${(result.strengths || []).map(s => `<li class="text-green-600 text-sm">✅ ${escapeHtml(s)}</li>`).join('')}</ul>
      </div>
      <div class="bg-amber-50 border border-amber-200 rounded-2xl p-4">
        <h3 class="text-amber-700 font-bold text-sm mb-2">🎯 Keep Practicing</h3>
        <ul class="space-y-1">${(result.improvements || []).map(s => `<li class="text-amber-600 text-sm">📌 ${escapeHtml(s)}</li>`).join('')}</ul>
      </div>
      <div class="bg-brand-50 border border-brand-200 rounded-2xl p-4">
        <h3 class="text-brand-700 font-bold text-sm mb-1">🌍 Fun Fact</h3>
        <p class="text-brand-600 text-sm">${escapeHtml(result.funFact || '')}</p>
      </div>
      <div class="bg-brand-100 rounded-2xl p-4 text-center">
        <p class="text-brand-700 text-sm italic">"${escapeHtml(result.motivationalQuote || '')}"</p>
      </div>
    `;
  } catch(e) {
    content.innerHTML = `
      <div class="text-center p-4 bg-brand-100 rounded-2xl">
        <div class="text-2xl">${avgFluency >= 7 ? '🌟' : '💪'}</div>
        <div class="text-brand-500 text-sm mt-2">${totalMsgs} messages • ${totalCorrections} corrections • Avg fluency: ${avgFluency.toFixed(1)}/10</div>
      </div>
      <p class="text-brand-400 text-sm text-center">Keep practicing to unlock detailed feedback! 🚀</p>
    `;
  }
}

function hideFeedbackPanel() {
  document.getElementById('feedback-panel').classList.add('hidden');
}

function escapeHtml(str) {
  if (!str) return '';
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

async function callAI(prompt, retries = 3) {
  const startTime = performance.now();
  const alias = 'genericAI';

  for (let attempt = 1; attempt <= retries; attempt++) {
    try {
      const resp = await fetch(`${API_BASE}/run_prompt`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          alias: alias,
          params: { prompt: prompt }
        })
      });

      if (!resp.ok) {
        const errorText = await resp.text();
        if (attempt === retries) {
          // Format error with AI
          try {
            const errorResult = await fetch(`${API_BASE}/run_prompt`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                alias: 'genericAI',
                params: {
                  prompt: `Reformat this API error into a user-friendly message that empowers the user to fix it. Include the full API response.
                  
API Response: ${errorText}
HTTP Status: ${resp.status}

Return a JSON object with key "userMessage" as a string.`
                }
              })
            });
            if (errorResult.ok) {
              const errData = await errorResult.json();
              throw new Error(errData.userMessage || errorText);
            }
          } catch(e2) {}
          throw new Error(`API error (${resp.status}): ${errorText}`);
        }
        await new Promise(r => setTimeout(r, 1000 * attempt));
        continue;
      }

      const data = await resp.json();
      const elapsed = performance.now() - startTime;
      
      // Track tokens and timing
      if (data.input_tokens) totalAIInputTokens += data.input_tokens;
      if (data.output_tokens) totalAIOutputTokens += data.output_tokens;
      totalAITime += elapsed;
      if (!aliasTimings[alias]) aliasTimings[alias] = 0;
      aliasTimings[alias] += elapsed;

      return data;
    } catch(e) {
      if (attempt === retries) throw e;
      await new Promise(r => setTimeout(r, 1000 * attempt));
    }
  }
}

// Close feedback panel on backdrop click
document.getElementById('feedback-panel').addEventListener('click', function(e) {
  if (e.target === this) hideFeedbackPanel();
});

init();
</script>
